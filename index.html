        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzWVe7ZcQlb3S1KwxZ4TFv3quMZ2I1TmfLFFBmPsNj6-przsDzyRq6UKJ1eOG5rVcRy/exec';
        
        // Google Sheets API wrapper
        const sheetsAPI = {
            // Load all audits from Google Sheets
            loadAll: async () => {
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=load`, {
                        method: 'GET'
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        return result.data || [];
                    } else {
                        console.error('Error loading data:', result.error);
                        alert('Gagal memuat data: ' + result.error);
                        return [];
                    }
                } catch (error) {
                    console.error('Error loading data:', error);
                    alert('Gagal memuat data. Pastikan URL Google Apps Script sudah benar dan sudah di-deploy.');
                    return [];
                }
            },
            
            // Save audit to Google Sheets
            save: async (auditData) => {
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: `action=save&data=${encodeURIComponent(JSON.stringify(auditData))}`
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        return true;
                    } else {
                        console.error('Error saving data:', result.error);
                        alert('Gagal menyimpan data: ' + result.error);
                        return false;
                    }
                } catch (error) {
                    console.error('Error saving data:', error);
                    alert('Gagal menyimpan data. Pastikan koneksi internet stabil.');
                    return false;
                }
            },
            
            // Delete audit from Google Sheets
            delete: async (auditId, auditTimestamp) => {
                try {
                    // Coba method POST dulu (primary)
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: `action=delete&id=${encodeURIComponent(auditId)}&timestamp=${encodeURIComponent(auditTimestamp || '')}`
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        return true;
                    } else {
                        // Fallback: coba GET request dengan parameter di URL
                        console.warn('POST delete gagal, mencoba GET fallback:', result.error);
                        const getResponse = await fetch(
                            `${SCRIPT_URL}?action=delete&id=${encodeURIComponent(auditId)}&timestamp=${encodeURIComponent(auditTimestamp || '')}`,
                            { method: 'GET' }
                        );
                        const getResult = await getResponse.json();
                        if (getResult.success) {
                            return true;
                        }
                        console.error('Error deleting data:', getResult.error);
                        alert('Gagal menghapus data: ' + (getResult.error || result.error));
                        return false;
                    }
                } catch (error) {
                    console.error('Error deleting data:', error);
                    alert('Gagal menghapus data. Pastikan koneksi internet stabil.\n\nDetail: ' + error.message);
                    return false;
                }
            }

        // Helper to get month name in Indonesian
        const getMonthName = (dateStr) => {
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 
                          'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            const date = new Date(dateStr);
            return `${months[date.getMonth()]} ${date.getFullYear()}`;
        };

        const getMonthYear = (dateStr) => {
            const date = new Date(dateStr);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        };

        const getMonthShort = (dateStr) => {
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 
                          'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            const date = new Date(dateStr);
            return `${months[date.getMonth()]} ${date.getFullYear()}`;
        };

        // BUG FIX #2: Format tanggal Indonesia untuk History
        const formatDateIndonesia = (isoDateString) => {
            const date = new Date(isoDateString);
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            
            return `${day}-${month}-${year} ${hours}:${minutes}`;
        };

        // Format tanggal — handle semua kemungkinan format dari Google Sheets
        const formatDateLocal = (dateStr) => {
            if (!dateStr) return '';
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
                            'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

            // Format "YYYY-MM-DD" -> parse manual, hindari timezone shift
            if (typeof dateStr === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(dateStr.trim())) {
                const parts = dateStr.trim().split('-');
                const year = parts[0], month = parts[1], day = parts[2];
                return `${parseInt(day)} ${months[parseInt(month) - 1]} ${year}`;
            }

            // Format "DD/MM/YYYY"
            if (typeof dateStr === 'string' && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(dateStr.trim())) {
                const parts = dateStr.trim().split('/');
                const day = parts[0], month = parts[1], year = parts[2];
                return `${parseInt(day)} ${months[parseInt(month) - 1]} ${year}`;
            }

            // Date object / string lain dari Google Sheets
            try {
                const d = new Date(dateStr);
                if (!isNaN(d.getTime())) {
                    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
                }
            } catch(e) {}

            return String(dateStr);
        };

        // BUG FIX #2: Format waktu dengan aman (handle both time string and ISO timestamp)
        const formatTime = (timeValue) => {
            if (!timeValue) return '';
            // If it's already a simple time string like "14:00", return as is
            if (typeof timeValue === 'string' && timeValue.match(/^\d{2}:\d{2}$/)) {
                return timeValue;
            }
            // If it's an ISO timestamp, extract just the time part
            try {
                const date = new Date(timeValue);
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                return `${hours}:${minutes}`;
            } catch (e) {
                return timeValue; // Return as is if parsing fails
            }
        };

            try {
              setLoading(true);
              const auditData = await sheetsAPI.loadAll();
              setAudits(auditData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
            } catch (error) {
              console.log('Loading audits:', error);
              alert('Gagal memuat data dari Google Sheets');
            } finally {
              setLoading(false);
            }
          };

          const saveAudit = async (auditData) => {
            try {
              // Cek duplikat: tanggal + unit + timeStart + timeEnd harus unik
              const isDuplicate = audits.some(audit => {
                // Normalisasi date: ambil hanya YYYY-MM-DD
                const normDate = (d) => {
                  if (!d) return '';
                  const s = String(d);
                  // Format YYYY-MM-DD
                  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0, 10);
                  // Format lain: parse lalu format ulang
                  const dt = new Date(d);
                  if (!isNaN(dt.getTime())) {
                    return dt.getFullYear() + '-' +
                           String(dt.getMonth()+1).padStart(2,'0') + '-' +
                           String(dt.getDate()).padStart(2,'0');
                  }
                  return s;
                };

                // Normalisasi waktu: ambil hanya HH:MM
                const normTime = (t) => {
                  if (!t) return '';
                  const s = String(t).trim();
                  if (/^\d{2}:\d{2}$/.test(s)) return s;
                  const dt = new Date(t);
                  if (!isNaN(dt.getTime())) {
                    return String(dt.getHours()).padStart(2,'0') + ':' +
                           String(dt.getMinutes()).padStart(2,'0');
                  }
                  return s;
                };

                return (
                  normDate(audit.date)      === normDate(auditData.date) &&
                  (audit.unit || '').trim() === (auditData.unit || '').trim() &&
                  normTime(audit.timeStart) === normTime(auditData.timeStart) &&
                  normTime(audit.timeEnd)   === normTime(auditData.timeEnd)
                );
              });

              if (isDuplicate) {
                alert('⚠️ Data duplikat!\n\nSudah ada data dengan:\n• Tanggal yang sama\n• Unit yang sama\n• Waktu mulai & selesai yang sama\n\nSilakan periksa kembali.');
                return false;
              }

              const success = await sheetsAPI.save(auditData);
              if (success) {
                await loadAudits();
                return true;
              }
              return false;
            } catch (error) {
              console.error('Error saving audit:', error);
              alert('Gagal menyimpan data ke Google Sheets');
              return false;
            }
          };

          const deleteAudit = async (auditId, auditTimestamp) => {
            if (!confirm('Hapus data audit ini?\n\nData yang dihapus tidak dapat dikembalikan.')) return;
            
            console.log('Trying to delete audit - ID:', auditId, '| Timestamp:', auditTimestamp);

              alert('Gagal menghapus data dari Google Sheets');
            }

          // Get unique months from audits

            const months = [...new Set(audits.map(a => getMonthYear(a.date)))];
            return months.sort().reverse();
          };

          // Get unique units from audits

            const units = [...new Set(audits.map(a => a.unit).filter(Boolean))];
            return units.sort();
          };

          // Filter audits by selected month AND unit
          const filteredAudits = audits.filter(a => {
            const monthMatch = selectedMonth === 'all' || getMonthYear(a.date) === selectedMonth;
            const unitMatch = selectedUnit === 'all' || a.unit === selectedUnit;
            return monthMatch && unitMatch;
          });

                            ? 'bg-blue-600 text-white shadow-lg'

                      >
                        <BarChart3 className="inline w-4 h-4 sm:w-5 sm:h-5 mr-1 sm:mr-2" />

                      <button
                        onClick={() => setCurrentView('monthly')}

                            ? 'bg-indigo-600 text-white shadow-lg'

                      <button
                        onClick={() => setCurrentView('history')}
                        className={`px-3 sm:px-4 py-2 rounded-lg font-medium transition-all text-sm ${

                            ? 'bg-purple-600 text-white shadow-lg'
                            : 'bg-gray-100 text-gray-700 hover:bg-gray-200'

              </header>

              <main className="max-w-7xl mx-auto px-4 py-4 sm:py-8">
                {loading && (currentView === 'dashboard' || currentView === 'monthly') ? (
                  <div className="text-center py-12">
                    <div className="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    <p className="mt-4 text-gray-600">Memuat data...</p>
                  </div>
                ) : currentView === 'dashboard' ? (
                  <DashboardView 
                    audits={audits} 
                    selectedMonth={selectedMonth}
                    setSelectedMonth={setSelectedMonth}
                    availableMonths={getAvailableMonths()}
                    filteredAudits={filteredAudits}
                    selectedUnit={selectedUnit}
                    setSelectedUnit={setSelectedUnit}
                    availableUnits={getAvailableUnits()}
                  />
                ) : currentView === 'monthly' ? (
                  <MonthlyView audits={audits} />
                ) : currentView === 'input' ? (
                  <InputView onSave={saveAudit} onCancel={() => setCurrentView('dashboard')} />
                ) : (
                  <HistoryView 
                    audits={audits} 
                    onDelete={deleteAudit}
                    selectedMonth={selectedMonth}
                    setSelectedMonth={setSelectedMonth}
                    availableMonths={getAvailableMonths()}
                    filteredAudits={filteredAudits}
                    selectedUnit={selectedUnit}
                    setSelectedUnit={setSelectedUnit}
                    availableUnits={getAvailableUnits()}
                  />
                )}
              </main>
            </div>
          );
        }

        function MonthlyView({ audits }) {
          // Group audits by month
          const groupByMonth = () => {
            const grouped = {};
            audits.forEach(audit => {
              const monthYear = getMonthYear(audit.date);
              if (!grouped[monthYear]) {
                grouped[monthYear] = [];
              }
              grouped[monthYear].push(audit);
            });
            return grouped;
          };

          const calculateMonthStats = (monthAudits) => {
            let totalOpportunities = 0;
            let totalCompliant = 0;
            let unitStats = {};

            monthAudits.forEach(audit => {
              if (!unitStats[audit.unit]) {
                unitStats[audit.unit] = { opportunities: 0, sessions: 0 };
              }
              unitStats[audit.unit].sessions++;
              
              audit.professions.forEach(prof => {
                prof.opportunities.forEach(opp => {
                  totalOpportunities++;
                  unitStats[audit.unit].opportunities++;
                  if (opp.action === 'H.Rub' || opp.action === 'Air M') totalCompliant++;
                });
              });
            });

            const complianceRate = totalOpportunities > 0 
              ? ((totalCompliant / totalOpportunities) * 100).toFixed(1)
              : 0;

            return { totalOpportunities, totalCompliant, complianceRate, unitStats };
          };

          const monthlyData = groupByMonth();
          const sortedMonths = Object.keys(monthlyData).sort().reverse();

          if (sortedMonths.length === 0) {
            return (
              <div className="bg-white rounded-xl shadow-lg p-8 sm:p-12 text-center">
                <Calendar className="w-12 h-12 sm:w-16 sm:h-16 text-gray-300 mx-auto mb-4" />
                <h3 className="text-lg sm:text-xl font-semibold text-gray-600 mb-2">Belum Ada Data Audit</h3>
                <p className="text-sm sm:text-base text-gray-500 mb-6">Mulai dengan menambahkan audit pertama Anda</p>
              </div>
            );
          }

          return (
            <div className="space-y-6">
              <div className="bg-white rounded-xl shadow-lg p-4 sm:p-6">
                <h2 className="text-xl sm:text-2xl font-bold text-gray-800 mb-6">📊 Ringkasan Per Bulan</h2>
                
                <div className="space-y-6">
                  {sortedMonths.map(monthYear => {
                    const monthAudits = monthlyData[monthYear];
                    const stats = calculateMonthStats(monthAudits);
                    
                    return (
                      <div key={monthYear} className="border-2 border-gray-200 rounded-xl p-4 sm:p-6 hover:border-blue-300 transition-all">
                        <div className="flex justify-between items-start mb-4">
                          <div>
                            <h3 className="text-lg sm:text-xl font-bold text-gray-800">
                              {getMonthName(monthAudits[0].date)}
                            </h3>
                            <p className="text-sm text-gray-600">{monthAudits.length} sesi audit</p>
                          </div>
                          <div className="text-right">
                            <div className={`text-2xl sm:text-3xl font-bold ${
                              stats.complianceRate >= 80 ? 'text-green-600' :
                              stats.complianceRate >= 60 ? 'text-yellow-600' : 'text-red-600'
                            }`}>
                              {stats.complianceRate}%
                            </div>
                            <p className="text-xs text-gray-600">Compliance</p>
                          </div>
                        </div>

                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-4">
                          <div className="bg-blue-50 rounded-lg p-3">
                            <p className="text-xs text-blue-600 font-medium">Total Sesi</p>
                            <p className="text-xl font-bold text-blue-900">{monthAudits.length}</p>
                          </div>
                          <div className="bg-green-50 rounded-lg p-3">
                            <p className="text-xs text-green-600 font-medium">Total Peluang</p>
                            <p className="text-xl font-bold text-green-900">{stats.totalOpportunities}</p>
                          </div>
                          <div className="bg-purple-50 rounded-lg p-3">
                            <p className="text-xs text-purple-600 font-medium">Compliant</p>
                            <p className="text-xl font-bold text-purple-900">{stats.totalCompliant}</p>
                          </div>
                          <div className="bg-orange-50 rounded-lg p-3">
                            <p className="text-xs text-orange-600 font-medium">Non-Compliant</p>
                            <p className="text-xl font-bold text-orange-900">{stats.totalOpportunities - stats.totalCompliant}</p>
                          </div>
                        </div>

                        {/* Unit breakdown */}
                        <div className="mt-4">
                          <h4 className="text-sm font-semibold text-gray-700 mb-3">Progress per Unit</h4>
                          <div className="space-y-2">
                            {Object.entries(stats.unitStats).map(([unit, data]) => {
                              const progress = ((data.opportunities / 200) * 100).toFixed(1);
                              return (
                                <div key={unit} className="bg-gray-50 rounded-lg p-3">
                                  <div className="flex justify-between items-center mb-2">
                                    <span className="font-medium text-sm text-gray-700">{unit}</span>
                                    <span className="text-xs text-gray-600">
                                      {data.opportunities}/200 opportunities ({data.sessions} sesi)
                                    </span>
                                  </div>
                                  <div className="w-full bg-gray-200 rounded-full h-2">
                                    <div
                                      className={`h-2 rounded-full transition-all ${
                                        progress >= 100 ? 'bg-green-500' :
                                        progress >= 75 ? 'bg-blue-500' :
                                        progress >= 50 ? 'bg-yellow-500' : 'bg-orange-500'
                                      }`}
                                      style={{ width: `${Math.min(progress, 100)}%` }}
                                    ></div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        }

        function DashboardView({ audits, selectedMonth, setSelectedMonth, availableMonths, filteredAudits, selectedUnit, setSelectedUnit, availableUnits }) {
          const calculateStats = () => {
            if (filteredAudits.length === 0) return null;

            let totalOpportunities = 0;
            let totalCompliant = 0;
            let professionStats = {};
            let methodStats = { 'H.Rub': 0, 'Air M': 0, 'Tidak': 0, 'Gloves': 0 };
            let unitStats = {};

            const nurseCategories = ['Perawat', 'Bidan'];
            const doctorCategories = ['Dokter'];
            
            let nurseOpps = 0, doctorOpps = 0, otherOpps = 0;

            filteredAudits.forEach(audit => {
              if (!unitStats[audit.unit]) {
                unitStats[audit.unit] = { opportunities: 0, sessions: 0 };
              }
              unitStats[audit.unit].sessions++;
              
              audit.professions.forEach(prof => {
                prof.opportunities.forEach(opp => {
                  totalOpportunities++;
                  unitStats[audit.unit].opportunities++;
                  
                  if (opp.action === 'H.Rub' || opp.action === 'Air M') totalCompliant++;
                  
                  methodStats[opp.action] = (methodStats[opp.action] || 0) + 1;

                  if (!professionStats[prof.name]) {
                    professionStats[prof.name] = { total: 0, compliant: 0 };
                  }
                  professionStats[prof.name].total++;
                  if (opp.action === 'H.Rub' || opp.action === 'Air M') professionStats[prof.name].compliant++;
                  
                  if (nurseCategories.includes(prof.name)) {
                    nurseOpps++;
                  } else if (doctorCategories.includes(prof.name)) {
                    doctorOpps++;
                  } else {
                    otherOpps++;
                  }
                });
              });
            });

            const complianceRate = totalOpportunities > 0 
              ? ((totalCompliant / totalOpportunities) * 100).toFixed(1)
              : 0;
              
            const nursePercent = totalOpportunities > 0 ? ((nurseOpps / totalOpportunities) * 100).toFixed(1) : 0;
            const doctorPercent = totalOpportunities > 0 ? ((doctorOpps / totalOpportunities) * 100).toFixed(1) : 0;
            const otherPercent = totalOpportunities > 0 ? ((otherOpps / totalOpportunities) * 100).toFixed(1) : 0;

            return { 
              totalOpportunities, 
              totalCompliant, 
              complianceRate, 
              professionStats, 
              methodStats,
              unitStats,
              professionDistribution: {
                nurse: { count: nurseOpps, percent: nursePercent, target: 70 },
                doctor: { count: doctorOpps, percent: doctorPercent, target: 10 },
                other: { count: otherOpps, percent: otherPercent, target: 20 }
              }
            };
          };

          const stats = calculateStats();

          const exportToExcel = () => {
            if (filteredAudits.length === 0) {
              alert('Tidak ada data untuk di-export');
              return;
            }

            try {
              // Urutkan audit berdasarkan unit lalu tanggal
              const sortedAudits = [...filteredAudits].sort((a, b) => {
                if (a.unit < b.unit) return -1;
                if (a.unit > b.unit) return 1;
                return new Date(a.date) - new Date(b.date);
              });

              const monthLabel = selectedMonth === 'all' ? 'Semua Data' : getMonthShort(selectedMonth + '-01');
              const unitLabel  = selectedUnit  === 'all' ? 'Semua Unit' : selectedUnit;

              // Format tanggal ke dd/mm/yyyy
              const fmtDate = (dateStr) => {
                const d = new Date(dateStr);
                const dd = String(d.getDate()).padStart(2,'0');
                const mm = String(d.getMonth()+1).padStart(2,'0');
                const yyyy = d.getFullYear();
                return `${dd}/${mm}/${yyyy}`;
              };

              // ── Struktur kolom 14 (A–N) ──────────────────────────────
              // A: Sesi  B: Tanggal
              // C: Dok Peluang  D: Dok HW  E: Dok HR
              // F: Pwr Peluang  G: Pwr HW  H: Pwr HR
              // I: Nks Peluang  J: Nks HW  K: Nks HR
              // L: Tot Peluang  M: Tot HW  N: Tot HR
              const NCOL = 14;

              const sheetData = [];
              const merges = [];

              // Row 1: Judul
              sheetData.push(['FORMULIR REKAPAN AUDIT KEPATUHAN KEBERSIHAN TANGAN RSU SURYA HUSADHA UBUNG 2026', ...Array(NCOL-1).fill('')]);
              merges.push({ s:{r:0,c:0}, e:{r:0,c:NCOL-1} });

              // Row 2: Bulan & Unit
              sheetData.push([`Bulan : ${monthLabel}   |   Unit : ${unitLabel}`, ...Array(NCOL-1).fill('')]);
              merges.push({ s:{r:1,c:0}, e:{r:1,c:NCOL-1} });

              // Row 3: Header grup profesi
              sheetData.push(['Sesi','Tanggal','Profesi : Dokter','','','Profesi : Perawat','','','Profesi : Nakes Lainnya','','','Total Per Sesi','','']);
              merges.push({ s:{r:2,c:2}, e:{r:2,c:4}  }); // Dokter
              merges.push({ s:{r:2,c:5}, e:{r:2,c:7}  }); // Perawat
              merges.push({ s:{r:2,c:8}, e:{r:2,c:10} }); // Nakes
              merges.push({ s:{r:2,c:11},e:{r:2,c:13} }); // Total

              // Row 4: Sub-header
              sheetData.push(['','','Peluang','HW','HR','Peluang','HW','HR','Peluang','HW','HR','Peluang','HW','HR']);

              // Data baris per unit dengan baris pemisah
              let sessionCounter = 1;
              const unitNames = [...new Set(sortedAudits.map(a => a.unit))].sort();
              const unitSumRanges = [];

              unitNames.forEach(unitName => {
                const unitAudits = sortedAudits.filter(a => a.unit === unitName);

                // Baris pemisah nama unit
                const sepIdx = sheetData.length;
                sheetData.push([unitName, ...Array(NCOL-1).fill('')]);
                merges.push({ s:{r:sepIdx,c:0}, e:{r:sepIdx,c:NCOL-1} });

                const unitStartRow = sheetData.length + 1; // 1-indexed Excel

                unitAudits.forEach(audit => {
                  const dok = { peluang:0, hw:0, hr:0 };
                  const pwr = { peluang:0, hw:0, hr:0 };
                  const nks = { peluang:0, hw:0, hr:0 };

                  audit.professions.forEach(prof => {
                    const cat = prof.name === 'Dokter' ? dok :
                                (prof.name === 'Perawat' || prof.name === 'Bidan') ? pwr : nks;
                    prof.opportunities.forEach(opp => {
                      cat.peluang++;
                      if (opp.action === 'Air M')      cat.hw++;
                      else if (opp.action === 'H.Rub') cat.hr++;
                    });
                  });

                  sheetData.push([
                    sessionCounter,
                    fmtDate(audit.date),
                    dok.peluang, dok.hw, dok.hr,
                    pwr.peluang, pwr.hw, pwr.hr,
                    nks.peluang, nks.hw, nks.hr,
                    dok.peluang + pwr.peluang + nks.peluang,
                    dok.hw      + pwr.hw      + nks.hw,
                    dok.hr      + pwr.hr      + nks.hr
                  ]);
                  sessionCounter++;
                });

                const unitEndRow = sheetData.length;
                unitSumRanges.push({ unit: unitName, startRow: unitStartRow, endRow: unitEndRow });
              });

              // Baris Total per Unit
              unitSumRanges.forEach(({ unit, startRow, endRow }) => {
                sheetData.push([
                  `Total ${unit}`, '',
                  { f: `SUM(C${startRow}:C${endRow})` },
                  { f: `SUM(D${startRow}:D${endRow})` },
                  { f: `SUM(E${startRow}:E${endRow})` },
                  { f: `SUM(F${startRow}:F${endRow})` },
                  { f: `SUM(G${startRow}:G${endRow})` },
                  { f: `SUM(H${startRow}:H${endRow})` },
                  { f: `SUM(I${startRow}:I${endRow})` },
                  { f: `SUM(J${startRow}:J${endRow})` },
                  { f: `SUM(K${startRow}:K${endRow})` },
                  { f: `SUM(L${startRow}:L${endRow})` },
                  { f: `SUM(M${startRow}:M${endRow})` },
                  { f: `SUM(N${startRow}:N${endRow})` }
                ]);
              });

              // Baris Grand Total
              const totalStartIdx = sheetData.length - unitSumRanges.length + 1;
              const totalEndIdx   = sheetData.length;
              sheetData.push([
                'GRAND TOTAL', '',
                { f: `SUM(C${totalStartIdx}:C${totalEndIdx})` },
                { f: `SUM(D${totalStartIdx}:D${totalEndIdx})` },
                { f: `SUM(E${totalStartIdx}:E${totalEndIdx})` },
                { f: `SUM(F${totalStartIdx}:F${totalEndIdx})` },
                { f: `SUM(G${totalStartIdx}:G${totalEndIdx})` },
                { f: `SUM(H${totalStartIdx}:H${totalEndIdx})` },
                { f: `SUM(I${totalStartIdx}:I${totalEndIdx})` },
                { f: `SUM(J${totalStartIdx}:J${totalEndIdx})` },
                { f: `SUM(K${totalStartIdx}:K${totalEndIdx})` },
                { f: `SUM(L${totalStartIdx}:L${totalEndIdx})` },
                { f: `SUM(M${totalStartIdx}:M${totalEndIdx})` },
                { f: `SUM(N${totalStartIdx}:N${totalEndIdx})` }
              ]);

              // Baris Persentase Grand Total
              const gtRow = sheetData.length; // Grand Total sudah di-push, ini baris berikutnya (0-indexed)
              const gtExcelRow = gtRow; // 1-indexed Excel = panjang array sebelum push persentase
              sheetData.push([
                'Persentase (%)', '',
                { f: `(D${gtExcelRow}+E${gtExcelRow})/C${gtExcelRow}` }, '', '',
                { f: `(G${gtExcelRow}+H${gtExcelRow})/F${gtExcelRow}` }, '', '',
                { f: `(J${gtExcelRow}+K${gtExcelRow})/I${gtExcelRow}` }, '', '',
                { f: `(M${gtExcelRow}+N${gtExcelRow})/L${gtExcelRow}` }, '', ''
              ]);

              const wb = XLSX.utils.book_new();
              const ws = XLSX.utils.aoa_to_sheet(sheetData);

              // Terapkan format persen ke sel persentase
              const pctExcelRow = sheetData.length; // 1-indexed
              ['C','F','I','L'].forEach(col => {
                const cellRef = col + pctExcelRow;
                if (ws[cellRef]) ws[cellRef].z = '0.00%';
              });

              ws['!cols'] = [
                { wch: 6  }, // A Sesi
                { wch: 12 }, // B Tanggal
                { wch: 10 }, // C Dok Peluang
                { wch: 6  }, // D HW
                { wch: 6  }, // E HR
                { wch: 10 }, // F Pwr Peluang
                { wch: 6  }, // G HW
                { wch: 6  }, // H HR
                { wch: 10 }, // I Nks Peluang
                { wch: 6  }, // J HW
                { wch: 6  }, // K HR
                { wch: 10 }, // L Tot Peluang
                { wch: 6  }, // M HW
                { wch: 6  }  // N HR
              ];

              ws['!merges'] = merges;

              XLSX.utils.book_append_sheet(wb, ws, 'Rekapan');

              const unitSuffix = selectedUnit === 'all' ? 'SEMUA_UNIT' : selectedUnit.replace(/\s/g, '_');
              const fileName = `FORMULIR_REKAPAN_AUDIT_HH_${monthLabel.replace(/\s/g, '_')}_${unitSuffix}_${new Date().toISOString().split('T')[0]}.xlsx`;
              XLSX.writeFile(wb, fileName);

            } catch (error) {
              console.error('Error exporting to Excel:', error);
              alert('Terjadi kesalahan saat export ke Excel: ' + error.message);
            }
          };

          if (!stats) {
            return (
              <div className="bg-white rounded-xl shadow-lg p-8 sm:p-12 text-center">
                <Calendar className="w-12 h-12 sm:w-16 sm:h-16 text-gray-300 mx-auto mb-4" />
                <h3 className="text-lg sm:text-xl font-semibold text-gray-600 mb-2">Belum Ada Data Audit</h3>
                <p className="text-sm sm:text-base text-gray-500 mb-6">Mulai dengan menambahkan audit pertama Anda</p>
              </div>
            );
          }

          return (
            <div className="space-y-4 sm:space-y-6">
              {/* Month & Unit Filter */}
              {availableMonths.length > 0 && (
                <div className="bg-white rounded-xl shadow-lg p-4">
                  <div className="flex flex-col sm:flex-row flex-wrap items-center gap-3">
                    <Filter className="w-5 h-5 text-gray-600" />
                    <label className="font-medium text-gray-700">Filter Bulan:</label>
                    <select
                      value={selectedMonth}
                      onChange={(e) => setSelectedMonth(e.target.value)}
                      className="flex-1 sm:flex-none px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    >
                      <option value="all">Semua Bulan</option>
                      {availableMonths.map(month => (
                        <option key={month} value={month}>
                          {getMonthName(month + '-01')}
                        </option>
                      ))}
                    </select>
                    <label className="font-medium text-gray-700">Filter Unit:</label>
                    <select
                      value={selectedUnit}
                      onChange={(e) => setSelectedUnit(e.target.value)}
                      className="flex-1 sm:flex-none px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    >
                      <option value="all">Semua Unit</option>
                      {availableUnits.map(unit => (
                        <option key={unit} value={unit}>{unit}</option>
                      ))}
                    </select>
                    {(selectedMonth !== 'all' || selectedUnit !== 'all') && (
                      <button
                        onClick={() => { setSelectedMonth('all'); setSelectedUnit('all'); }}
                        className="text-sm text-blue-600 hover:text-blue-800"
                      >
                        Reset Filter
                      </button>
                    )}
                  </div>
                </div>
              )}

              {/* Target Progress Alert */}
              <div className="bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl shadow-lg p-4 sm:p-6 text-white">
                <div className="flex items-center justify-between mb-3">
                  <h3 className="text-lg sm:text-xl font-bold">
                    📊 Progress Target per Unit
                    {selectedMonth !== 'all' && <span className="text-sm ml-2">({getMonthName(selectedMonth + '-01')})</span>}
                  </h3>
                </div>
                <div className="space-y-3">
                  {Object.entries(stats.unitStats).map(([unit, data]) => {
                    const progress = ((data.opportunities / 200) * 100).toFixed(1);
                    return (
                      <div key={unit} className="bg-white bg-opacity-20 rounded-lg p-3">
                        <div className="flex justify-between items-center mb-2">
                          <span className="font-semibold">{unit}</span>
                          <span className="text-sm">{data.opportunities} / 200 opportunities ({data.sessions} sesi)</span>
                        </div>
                        <div className="w-full bg-white bg-opacity-30 rounded-full h-3">
                          <div
                            className="bg-white h-3 rounded-full transition-all"
                            style={{ width: `${Math.min(progress, 100)}%` }}
                          ></div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
              
              {/* Summary Cards */}
              <div className="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-6">
                <div className="bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl shadow-lg p-4 sm:p-6 text-white">
                  <div className="flex items-center justify-between">
                    <div>
                      <p className="text-blue-100 text-xs sm:text-sm font-medium">Total Sesi</p>
                      <p className="text-2xl sm:text-4xl font-bold mt-1 sm:mt-2">{filteredAudits.length}</p>
                    </div>
                    <Calendar className="w-8 h-8 sm:w-12 sm:h-12 text-blue-200" />
                  </div>
                </div>

                <div className="bg-gradient-to-br from-green-500 to-green-600 rounded-xl shadow-lg p-4 sm:p-6 text-white">
                  <div className="flex items-center justify-between">
                    <div>
                      <p className="text-green-100 text-xs sm:text-sm font-medium">Total Peluang</p>
                      <p className="text-2xl sm:text-4xl font-bold mt-1 sm:mt-2">{stats.totalOpportunities}</p>
                    </div>
                    <TrendingUp className="w-8 h-8 sm:w-12 sm:h-12 text-green-200" />
                  </div>
                </div>

                <div className="bg-gradient-to-br from-purple-500 to-purple-600 rounded-xl shadow-lg p-4 sm:p-6 text-white">
                  <div className="flex items-center justify-between">
                    <div>
                      <p className="text-purple-100 text-xs sm:text-sm font-medium">Compliance</p>
                      <p className="text-2xl sm:text-4xl font-bold mt-1 sm:mt-2">{stats.complianceRate}%</p>
                    </div>
                    <CheckCircle className="w-8 h-8 sm:w-12 sm:h-12 text-purple-200" />
                  </div>
                </div>

                <div className="bg-gradient-to-br from-orange-500 to-orange-600 rounded-xl shadow-lg p-4 sm:p-6 text-white">
                  <div className="flex items-center justify-between">
                    <div>
                      <p className="text-orange-100 text-xs sm:text-sm font-medium">Compliant</p>
                      <p className="text-2xl sm:text-4xl font-bold mt-1 sm:mt-2">{stats.totalCompliant}</p>
                    </div>
                    <Users className="w-8 h-8 sm:w-12 sm:h-12 text-orange-200" />
                  </div>
                </div>
              </div>
              
              {/* Profession Distribution vs Target */}
              <div className="bg-white rounded-xl shadow-lg p-4 sm:p-6">
                <h3 className="text-base sm:text-lg font-bold text-gray-800 mb-4">📋 Distribusi Profesi vs Target</h3>
                <div className="space-y-4">
                  <div>
                    <div className="flex justify-between text-sm mb-2">
                      <span className="font-medium text-gray-700">👩‍⚕️ Perawat/Bidan</span>
                      <div className="text-right">
                        <span className={`font-semibold ${
                          Math.abs(stats.professionDistribution.nurse.percent - stats.professionDistribution.nurse.target) <= 5 
                            ? 'text-green-600' 
                            : 'text-yellow-600'
                        }`}>
                          {stats.professionDistribution.nurse.percent}%
                        </span>
                        <span className="text-gray-500 ml-2">(Target: 70%)</span>
                      </div>
                    </div>
                    <div className="flex gap-2">
                      <div className="flex-1 bg-gray-200 rounded-full h-3">
                        <div
                          className="bg-gradient-to-r from-blue-500 to-blue-600 h-3 rounded-full transition-all"
                          style={{ width: `${stats.professionDistribution.nurse.percent}%` }}
                        ></div>
                      </div>
                      <span className="text-xs text-gray-600 w-16 text-right">{stats.professionDistribution.nurse.count} opp</span>
                    </div>
                  </div>
                  
                  <div>
                    <div className="flex justify-between text-sm mb-2">
                      <span className="font-medium text-gray-700">👨‍⚕️ Dokter</span>
                      <div className="text-right">
                        <span className={`font-semibold ${
                          Math.abs(stats.professionDistribution.doctor.percent - stats.professionDistribution.doctor.target) <= 5 
                            ? 'text-green-600' 
                            : 'text-yellow-600'
                        }`}>
                          {stats.professionDistribution.doctor.percent}%
                        </span>
                        <span className="text-gray-500 ml-2">(Target: 10%)</span>
                      </div>
                    </div>
                    <div className="flex gap-2">
                      <div className="flex-1 bg-gray-200 rounded-full h-3">
                        <div
                          className="bg-gradient-to-r from-green-500 to-green-600 h-3 rounded-full transition-all"
                          style={{ width: `${stats.professionDistribution.doctor.percent}%` }}
                        ></div>
                      </div>
                      <span className="text-xs text-gray-600 w-16 text-right">{stats.professionDistribution.doctor.count} opp</span>
                    </div>
                  </div>
                  
                  <div>
                    <div className="flex justify-between text-sm mb-2">
                      <span className="font-medium text-gray-700">🔧 Petugas Lain</span>
                      <div className="text-right">
                        <span className={`font-semibold ${
                          Math.abs(stats.professionDistribution.other.percent - stats.professionDistribution.other.target) <= 5 
                            ? 'text-green-600' 
                            : 'text-yellow-600'
                        }`}>
                          {stats.professionDistribution.other.percent}%
                        </span>
                        <span className="text-gray-500 ml-2">(Target: 20%)</span>
                      </div>
                    </div>
                    <div className="flex gap-2">
                      <div className="flex-1 bg-gray-200 rounded-full h-3">
                        <div
                          className="bg-gradient-to-r from-purple-500 to-purple-600 h-3 rounded-full transition-all"
                          style={{ width: `${stats.professionDistribution.other.percent}%` }}
                        ></div>
                      </div>
                      <span className="text-xs text-gray-600 w-16 text-right">{stats.professionDistribution.other.count} opp</span>
                    </div>
                  </div>
                </div>
              </div>

              <div className="flex justify-end">
                <button
                  onClick={exportToExcel}
                  className="bg-emerald-600 text-white px-4 sm:px-6 py-2 sm:py-3 rounded-lg font-medium hover:bg-emerald-700 transition-colors shadow-lg text-sm"
                >
                  <Download className="inline w-4 h-4 sm:w-5 sm:h-5 mr-2" />
                  Export ke Excel
                </button>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6">
                <div className="bg-white rounded-xl shadow-lg p-4 sm:p-6">
                  <h3 className="text-base sm:text-lg font-bold text-gray-800 mb-4">Compliance per Profesi</h3>
                  <div className="space-y-3">
                    {Object.entries(stats.professionStats).map(([name, data]) => {
                      const rate = ((data.compliant / data.total) * 100).toFixed(1);
                      return (
                        <div key={name}>
                          <div className="flex justify-between text-xs sm:text-sm mb-1">
                            <span className="font-medium text-gray-700">{name}</span>
                            <span className="text-gray-600">{rate}% ({data.compliant}/{data.total})</span>
                          </div>

                    ← Kembali ke List
                  </button>
                  
                  <h2 className="text-xl sm:text-2xl font-bold text-gray-800 mb-4 sm:mb-6">Detail Audit</h2>
                  
                  <div className="bg-blue-50 rounded-lg p-4 sm:p-6 mb-4 sm:mb-6 border border-blue-200">
                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 sm:gap-4">
                      {selectedAudit.sessionNumber && (
                        <div>
                          <p className="text-xs sm:text-sm text-gray-600">Sesi</p>
                          <p className="font-semibold text-gray-800 text-sm sm:text-base">{selectedAudit.sessionNumber}</p>
                        </div>
                      )}
                      <div>
                        <p className="text-xs sm:text-sm text-gray-600">Unit</p>
                        <p className="font-semibold text-gray-800 text-sm sm:text-base">{selectedAudit.unit}</p>
                      </div>
                      <div>
                        <p className="text-xs sm:text-sm text-gray-600">Tanggal</p>
                        <p className="font-semibold text-gray-800 text-sm sm:text-base">{formatDateLocal(selectedAudit.date)}</p>
                      </div>
                      <div>
                        <p className="text-xs sm:text-sm text-gray-600">Observer</p>
                        <p className="font-semibold text-gray-800 text-sm sm:text-base">{selectedAudit.observer}</p>
                      </div>
                      <div>
                        <p className="text-xs sm:text-sm text-gray-600">Waktu</p>
                        <p className="font-semibold text-gray-800 text-sm sm:text-base">{formatTime(selectedAudit.timeStart)} - {formatTime(selectedAudit.timeEnd)}</p>
                      </div>
                      <div>
                        <p className="text-xs sm:text-sm text-gray-600">Durasi</p>
                        <p className="font-semibold text-gray-800 text-sm sm:text-base">{selectedAudit.duration}</p>
                      </div>
                    </div>
                    {selectedAudit.notes && (
                      <div className="mt-4 pt-4 border-t border-blue-200">
                        <p className="text-xs sm:text-sm text-gray-600 mb-1">Keterangan</p>
                        <p className="text-gray-800 text-sm sm:text-base">{selectedAudit.notes}</p>
                      </div>
                    )}
                  </div>

                  <div className="space-y-4 sm:space-y-6">
                    {selectedAudit.professions.map((prof, idx) => (
                      <div key={idx} className="bg-white border-2 border-gray-200 rounded-lg p-4 sm:p-6">
                        <div className="flex flex-wrap justify-between items-center mb-4 gap-2">
                          <h3 className="text-base sm:text-lg font-bold text-gray-800">{prof.name}</h3>
                          <span className="bg-blue-100 text-blue-800 px-2 sm:px-3 py-1 rounded-full text-xs sm:text-sm font-semibold">
                            Jumlah: {prof.count}
                          </span>
                        </div>
                        
                        <div className="overflow-x-auto">
                          <table className="w-full">
                            <thead>
                              <tr className="bg-gray-50 border-b-2 border-gray-200">
                                <th className="text-left p-2 sm:p-3 text-xs sm:text-sm font-semibold text-gray-700">Peluang</th>
                                <th className="text-left p-2 sm:p-3 text-xs sm:text-sm font-semibold text-gray-700">Indikasi (Momen)</th>
                                <th className="text-left p-2 sm:p-3 text-xs sm:text-sm font-semibold text-gray-700">Kebersihan Tangan</th>
                              </tr>
                            </thead>
                            <tbody>
                              {prof.opportunities.map((opp, oppIdx) => (
                                <tr key={oppIdx} className="border-b border-gray-100">
                                  <td className="p-2 sm:p-3 text-xs sm:text-sm font-medium text-gray-800">{opp.opportunity}</td>
                                  <td className="p-2 sm:p-3 text-xs sm:text-sm text-gray-700">
                                    {(opp.indications || [opp.indication]).map(ind => `Momen ${ind}`).join(', ')}
                                  </td>
                                  <td className="p-2 sm:p-3">
                                    <span className={`inline-block px-2 sm:px-3 py-1 rounded-full text-xs font-semibold ${
                                      opp.action === 'H.Rub' ? 'bg-green-100 text-green-800' :
                                      opp.action === 'Air M' ? 'bg-blue-100 text-blue-800' :
                                      opp.action === 'Gloves' ? 'bg-purple-100 text-purple-800' :
                                      'bg-red-100 text-red-800'
                                    }`}>
                                      {opp.action}
                                    </span>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="bg-white rounded-xl shadow-lg p-4 sm:p-6">
                  <h2 className="text-xl sm:text-2xl font-bold text-gray-800 mb-4 sm:mb-6">History Audit</h2>
                  
                  {/* Month & Unit Filter */}
                  {availableMonths.length > 0 && (
                    <div className="mb-6 bg-gray-50 rounded-lg p-4">
                      <div className="flex flex-col sm:flex-row flex-wrap items-center gap-3">
                        <Filter className="w-5 h-5 text-gray-600" />
                        <label className="font-medium text-gray-700">Filter Bulan:</label>
                        <select
                          value={selectedMonth}
                          onChange={(e) => setSelectedMonth(e.target.value)}
                          className="flex-1 sm:flex-none px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        >
                          <option value="all">Semua Bulan</option>
                          {availableMonths.map(month => (
                            <option key={month} value={month}>
                              {getMonthName(month + '-01')}
                            </option>
                          ))}
                        </select>
                        <label className="font-medium text-gray-700">Filter Unit:</label>
                        <select
                          value={selectedUnit}
                          onChange={(e) => setSelectedUnit(e.target.value)}
                          className="flex-1 sm:flex-none px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        >
                          <option value="all">Semua Unit</option>
                          {availableUnits.map(unit => (
                            <option key={unit} value={unit}>{unit}</option>
                          ))}
                        </select>
                        {(selectedMonth !== 'all' || selectedUnit !== 'all') && (
                          <button
                            onClick={() => { setSelectedMonth('all'); setSelectedUnit('all'); }}
                            className="text-sm text-purple-600 hover:text-purple-800"
                          >
                            Reset Filter
                          </button>
                        )}
                      </div>
                    </div>
                  )}
                  
                  <div className="overflow-x-auto">
                    <table className="w-full">
                      <thead>
                        <tr className="bg-gray-50 border-b-2 border-gray-200">
                          <th className="text-left p-2 sm:p-3 text-xs sm:text-sm font-semibold text-gray-700">Tanggal</th>
                          <th className="text-left p-2 sm:p-3 text-xs sm:text-sm font-semibold text-gray-700">Unit</th>
                          <th className="text-left p-2 sm:p-3 text-xs sm:text-sm font-semibold text-gray-700 hidden sm:table-cell">Observer</th>
                          <th className="text-center p-2 sm:p-3 text-xs sm:text-sm font-semibold text-gray-700">Aksi</th>
                        </tr>
                      </thead>
                      <tbody>
                        {filteredAudits.map((audit) => (
                          <tr key={audit.id} className="border-b border-gray-100 hover:bg-gray-50">
                            <td className="p-2 sm:p-3 text-xs sm:text-sm text-gray-800">{formatDateLocal(audit.date)}</td>
                            <td className="p-2 sm:p-3 text-xs sm:text-sm text-gray-800">{audit.unit}</td>
                            <td className="p-2 sm:p-3 text-xs sm:text-sm text-gray-800 hidden sm:table-cell">{audit.observer}</td>
                            <td className="p-2 sm:p-3">
                              <div className="flex justify-center gap-2">
                                <button
                                  onClick={() => setSelectedAudit(audit)}
                                  className="bg-blue-600 text-white px-2 sm:px-3 py-1 rounded text-xs sm:text-sm hover:bg-blue-700"
                                >
                                  <Eye className="inline w-3 h-3 sm:w-4 sm:h-4" />
                                </button>
                                <button
                                  onClick={async () => {
                                    // Pass both id and timestamp for reliable deletion
                                    console.log('Deleting audit - ID:', audit.id, '| Timestamp:', audit.timestamp);
                                    setDeletingId(audit.id);
                                    await onDelete(audit.id, audit.timestamp);
                                    setDeletingId(null);
                                  }}
                                  disabled={deletingId === audit.id}
                                  className={`text-white px-2 sm:px-3 py-1 rounded text-xs sm:text-sm ${
                                    deletingId === audit.id 
                                      ? 'bg-gray-400 cursor-not-allowed' 
                                      : 'bg-red-600 hover:bg-red-700'
                                  }`}
                                  title="Hapus data audit ini"
                                >
                                  {deletingId === audit.id ? '⏳' : <Trash2 className="inline w-3 h-3 sm:w-4 sm:h-4" />}
                                </button>
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HandHygieneAuditApp />);
    </script>

    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js')
                    .then(function(reg) { console.log('SW registered:', reg.scope); })
                    .catch(function(err) { console.log('SW registration failed:', err); });
            });
        }
    </script>
</body>
</html>
